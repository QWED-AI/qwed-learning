name: Financial Compliance Verification Gate

on: [pull_request]

jobs:
  audit_numbers:
    runs-on: ubuntu-latest
    name: Deterministic verification gate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verifier
        run: pip install qwed-verification==5.1.0

      - name: Run finance verification script
        run: python lab-files/verify_financial_csv.py --input lab-files/rates_update.csv --fail-on-error
